<!doctype html>
<html lang="en">
	<head>
			<meta charset="utf-8">
			<title>Html Lecture</title>
			<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
			<style>
				body{
font-family: "Orbitron", sans-serif;
				}
				</style>
	</head>
	<body>
			<!-- Select Tag -->

			<select>
				<option>Choose Any</option>
				<option value="crome">Crome</option>
				<option value="opera">Opera</option>
				<option value="safari">Safari</option>
				<option value="firefox" selected>Firefox</option>
				<option value="brave">Brave</option>
			</select>


			<select>
				<option>Choose Any</option>
				<optgroup label="Browsers">
					<option value="crome">Crome</option>
				<option value="opera">Opera</option>
				<option value="safari">Safari</option>
				<option value="firefox">Firefox</option>
				<option value="brave">Brave</option>
				</optgroup>
				<optgroup label="Fruits">
					<option value="apple">Apple</option>
				<option value="banana">Banana</option>
				<option value="orange">Orange</option>
				<option value="kiwi">Kiwi</option>
				<option value="graps">Graps</option>
				</optgroup>
				
			</select>


			<!-- Datalist Tag -->

			<input type="list" list="Browsers">
			<datalist id="Browsers">
					<option value="crome"></option>
					<option value="opera"></option>
					<option value="brave"></option>
					<option value="firefox"></option>
					<option value="safari"></option>
			</datalist>

			<!-- BDO tag -->

			<bdo dir="ltr">This is BDO Tag</bdo>
			<bdo dir="rtl">This is BDO Tag</bdo>

			<!-- Blockquote -->

			<blockquote>
					This is blockquote Tag
			</blockquote>

			<!-- abbr tag -->

			<abbr title="Hypertext markup language">HTML</abbr>

			<!-- Q tag -->

			<q>This is defult quoted text</q>

			<!-- Button Tag -->

			<button>Click</button>

			<!-- Progressbar tag-->

			<progress value="60" max="100"></progress>

			<!-- kbd tag -->

			<kbd>ctrl + v</kbd>

			<!-- iframe tag -->

			<iframe src="./asset/images/layout-1.png" frameborder="0"></iframe>

			<iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2939.6022409347993!2d72.8493382740151!3d21.219986981185613!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3be04f1e036267c9%3A0x5a012544102e6c2d!2sRed%20%26%20White%20Skill%20Education%20-%20A.K.%20Road%2C%20Surat!5e1!3m2!1sen!2sin!4v1780662629123!5m2!1sen!2sin" width="300" height="300" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe><br>

			<!-- textarea -->

			<textarea rows="20" cols="20" style="resize:vertical;">
			</textarea>

			<!-- empty tag -->

			<br>
			<hr>
			
	</body>
</html>
