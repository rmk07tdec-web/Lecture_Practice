<!DOCTYPE html>
<html lang="en">
<head>
  
  <title>Login Form</title>

  <style>
    

    body{
      background:#f2f2f2;
      justify-content:center;
      align-items:center;
      height:100vh;
    }
    label{
      display:block;
      margin-bottom:8px;
      color:#666;
      font-size:20px;
    }

    .input-box{
      width:100%;
      padding:10px;
      border:1px solid #999;
     
      font-size:14px;
      margin-bottom:20px;
    }

    
    

    .btn{
      width:100%;
      padding:10px;
      border:none;
      border-radius:6px;
      background:#1565d8;
      color:white;
      cursor:pointer;
    }

    
  </style>
</head>

<body>
<form>
  <div class="login-box">

    <label>Email</label>
    <input type="email" class="input-box" placeholder="example@gmail.com">

    <label>Password</label>

    <div class="password-box">
      <input type="password" class="input-box"  placeholder="Enter Your Password">
      
    </div>

    <div >
      <div">
        <input type="checkbox">
        <label>remember me</label>
      </div>

      <a href="#" >Forgot Password?</a>
    </div>

    <button class="btn">Sign In</button>

  </div>
</form>
</body>
</html>
