<!doctype html>
<html>
	<head>
			<title>Html Lecture</title>
			<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
			<style>
				body{
font-family: "Orbitron", sans-serif;
				}
				.container{
					height: 100vh;
					display: flex;
					justify-content: center;
					align-items: center;
				}
				form{
					background: lightblue;
					width:600px;
					padding:30px;
				}
				
				figcaption{
					text-align: center;
					margin-bottom: 20px;
				}

				label , input {
					margin-bottom: 10px;
				} 

				input{
					padding:5px;
					width:100%;
				}

				.field{
					display: flex;
					gap:20px;
					}

				.field label{
					
				}

				button{
					background: blue;
					width:100%;
					border:none;
					padding:10px;
					color:white;
				}

			</style>
	</head>
	<body>
			<!-- Form Tag -->
			<div class="container">
				<form>
					<fieldset>
						<legend>Html Form</legend>
						<figcaption>Html Form Element</figcaption>
							<div class="field">
								<div>
									<label>First Name</label>
								<input type="text" required/>
								</div>
								<div>
									  <label>Last Name</label>
								<input type="text" required  />
								</div>
								
							  
							</div>
							<div>
								<label>Email</label><br>
								<input type="email" value="example@gmail.com" required readonly />
							</div>
							<div>
								<label>Phone Number</label><br>
								<input type="Phone" required />
							</div>
							<div>
								<label>City</label><br>
								<input type="text" required />
							</div>
							<div>
								<label>Country</label><br>
								<input type="text" required />
							</div>
							<div>
									<button type="submit">submit</button>
							</div>
					</fieldset>
				</form>
			</div>
			
	</body>
</html>
